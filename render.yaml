services:
  - type: web
    name: ss-ai-server
    runtime: docker
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: VECTOR_STORE_TYPE
        value: faiss
      - key: VECTOR_STORE_PATH
        value: /data/vector_store
      - key: AI_DEFAULT_PROVIDER
        value: openclip
      - key: AI_DEFAULT_MODEL
        value: ViT-B-32
      - key: AI_DEVICE
        value: cpu
      - key: CORS_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: WORKERS
        value: "1"
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: data
      mountPath: /data
      sizeGB: 4
    healthCheckPath: /api/v1/health/
    autoDeploy: true
